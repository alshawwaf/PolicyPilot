{% extends "base.html" %}
{% block title %}Sign in{% endblock %}
{% block nav %}{% endblock %}
{% block content %}
<div class="card" style="max-width:380px; margin:56px auto;">
  <span class="icon-chip lg" style="margin-bottom:14px;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
  <h1>Sign in</h1>
  <p class="muted">PolicyPilot — the bridge to your Check Point policy</p>
  {% if error %}<div class="err" style="margin-top:12px;">{{ error }}</div>{% endif %}
  <form method="post" action="/login">
    <label for="login-username">Username</label>
    <input id="login-username" name="username" autofocus autocomplete="username">
    <label for="login-password">Password</label>
    <input id="login-password" name="password" type="password" autocomplete="current-password">
    <div style="margin-top:18px;"><button type="submit">Sign in</button></div>
  </form>
</div>
{% endblock %}
