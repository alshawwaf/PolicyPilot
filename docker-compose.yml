# Hosted deployment: Caddy (auto-TLS) in front of the app.
#   1. cp .env.example .env  and fill in PILOT_DOMAIN, PILOT_BASE_URL, secrets
#   2. docker compose up -d --build
services:
  app:
    build: .
    environment:
      - PILOT_BASE_URL=${PILOT_BASE_URL:-http://localhost:8000}
      - PILOT_SESSION_SECRET=${PILOT_SESSION_SECRET}
      # Set independently from the session secret so rotating the session secret never orphans stored
      # credentials (falls back to the session secret only if unset — see app/config.py).
      - PILOT_ENCRYPTION_KEY=${PILOT_ENCRYPTION_KEY}
      - PILOT_ADMIN_USERNAME=${PILOT_ADMIN_USERNAME:-admin}
      - PILOT_ADMIN_PASSWORD=${PILOT_ADMIN_PASSWORD}
      - PILOT_DATABASE_URL=sqlite:////data/policypilot.db
      # Caddy is a single reverse proxy in front, so the real client is one X-Forwarded-For hop in. This lets
      # the login brute-force throttle key on the real client instead of a spoofable header.
      - PILOT_TRUSTED_PROXY_HOPS=1
    volumes:
      - policypilot-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      - PILOT_DOMAIN=${PILOT_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  policypilot-data:
  caddy-data:
  caddy-config:
