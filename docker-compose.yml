# Hosted deployment: Caddy (auto-TLS) in front of the app.
#   1. cp .env.example .env  and fill in PILOT_DOMAIN, PILOT_BASE_URL, secrets
#   2. docker compose up -d --build
services:
  app:
    build: .
    environment:
      - PILOT_BASE_URL=${PILOT_BASE_URL:-http://localhost:8000}
      - PILOT_SESSION_SECRET=${PILOT_SESSION_SECRET}
      - PILOT_ADMIN_USERNAME=${PILOT_ADMIN_USERNAME:-admin}
      - PILOT_ADMIN_PASSWORD=${PILOT_ADMIN_PASSWORD}
      - PILOT_DATABASE_URL=sqlite:////data/policypilot.db
      # SIEM receiver port (Check Point Log Exporter target). 0 disables the listener.
      - PILOT_SYSLOG_PORT=${PILOT_SYSLOG_PORT:-5514}
    ports:
      # Raw syslog/CEF/LEEF from Log Exporter isn't HTTP, so it bypasses Caddy and is published
      # straight from the app. Point cp_log_export target-port at this port (host = container).
      - "${PILOT_SYSLOG_PORT:-5514}:${PILOT_SYSLOG_PORT:-5514}/udp"
      - "${PILOT_SYSLOG_PORT:-5514}:${PILOT_SYSLOG_PORT:-5514}/tcp"
    volumes:
      - policypilot-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
      - "9440:9440"   # Nutanix: CloudGuard's Prism connector hardcodes port 9440 (same cert/app)
    environment:
      - PILOT_DOMAIN=${PILOT_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  policypilot-data:
  caddy-data:
  caddy-config:
